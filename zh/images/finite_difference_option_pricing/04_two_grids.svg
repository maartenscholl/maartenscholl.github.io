<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" font-family="'Merriweather Sans', sans-serif">
  <defs>
    <style>
      .axis{stroke:#D0C8C0;stroke-width:1.4}
      .node{fill:#003066;stroke:#003066;stroke-width:1}
      .lognode{fill:#BC0031;stroke:#BC0031;stroke-width:1}
      .ttl{fill:#003066;font-size:14px;font-weight:600}
      .lttl{fill:#BC0031;font-size:14px;font-weight:600}
      .cap{fill:#858585;font-size:12px}
      .sm{fill:#858585;font-size:11px;text-anchor:middle}
    </style>
  </defs>

  <!-- Row A: uniform S grid -->
  <text class="ttl" x="70" y="58">Uniform grid in S</text>
  <line class="axis" x1="70" y1="95" x2="610" y2="95"/>
  <!-- nodes at S = 0,25,...,200 -->
  <circle class="node" cx="70"  cy="95" r="4.5"/>
  <circle class="node" cx="137.5" cy="95" r="4.5"/>
  <circle class="node" cx="205" cy="95" r="4.5"/>
  <circle class="node" cx="272.5" cy="95" r="4.5"/>
  <circle class="node" cx="340" cy="95" r="4.5"/>
  <circle class="node" cx="407.5" cy="95" r="4.5"/>
  <circle class="node" cx="475" cy="95" r="4.5"/>
  <circle class="node" cx="542.5" cy="95" r="4.5"/>
  <circle class="node" cx="610" cy="95" r="4.5"/>
  <text class="sm" x="70" y="118">0</text>
  <text class="sm" x="340" y="118">100</text>
  <text class="sm" x="610" y="118">S&#8202;=&#8202;S&#8320;&#8202;&#8202;&#8202; </text>
  <text class="cap" x="70" y="140">constant step &#916;S &#8594; coefficients grow with S:  &#189;&#963;&#178;i&#178;,  ri</text>

  <!-- Row B: uniform log grid -->
  <text class="lttl" x="70" y="200">Uniform grid in x = ln S</text>
  <line class="axis" x1="70" y1="237" x2="610" y2="237"/>
  <!-- geometric S nodes 12.5,17.7,25,35.4,50,70.7,100,141.4,200 mapped px=70+(S/200)*540 -->
  <circle class="lognode" cx="103.8" cy="237" r="4.5"/>
  <circle class="lognode" cx="117.8" cy="237" r="4.5"/>
  <circle class="lognode" cx="137.5" cy="237" r="4.5"/>
  <circle class="lognode" cx="165.6" cy="237" r="4.5"/>
  <circle class="lognode" cx="205"   cy="237" r="4.5"/>
  <circle class="lognode" cx="260.9" cy="237" r="4.5"/>
  <circle class="lognode" cx="340"   cy="237" r="4.5"/>
  <circle class="lognode" cx="451.8" cy="237" r="4.5"/>
  <circle class="lognode" cx="610"   cy="237" r="4.5"/>
  <text class="sm" x="340" y="260">100</text>
  <text class="sm" x="610" y="260">S&#8202;=&#8202;S&#8320;&#8202;&#8202;&#8202; </text>
  <text class="cap" x="70" y="282">constant step &#916;x &#8594; coefficients constant:  &#189;&#963;&#178;,  r&#8722;&#189;&#963;&#178;   (nodes crowd at small S)</text>
</svg>
