<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" font-family="'Merriweather Sans', sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#003066"/>
    </marker>
    <style>
      .node{fill:#fff;stroke:#003066;stroke-width:2}
      .hub{fill:#FFCD00;stroke:#003066;stroke-width:2}
      .lbl{fill:#003066;font-size:15px;font-weight:600;text-anchor:middle;dominant-baseline:central}
      .edge{stroke:#003066;stroke-width:1.6;fill:none;marker-end:url(#ah)}
      .cap{fill:#858585;font-size:13px;text-anchor:middle;font-style:italic}
    </style>
  </defs>

  <!-- BEFORE -->
  <text class="cap" x="170" y="28">Before: bilateral debts</text>
  <path class="edge" d="M108,78 L232,78"/>
  <path class="edge" d="M250,92 L250,206"/>
  <path class="edge" d="M108,92 L232,206"/>
  <path class="edge" d="M90,206 L90,92"/>
  <path class="edge" d="M232,228 L108,228"/>
  <circle class="node" cx="90" cy="78" r="20"/><text class="lbl" x="90" y="78">A</text>
  <circle class="node" cx="250" cy="78" r="20"/><text class="lbl" x="250" y="78">B</text>
  <circle class="node" cx="250" cy="222" r="20"/><text class="lbl" x="250" y="222">C</text>
  <circle class="node" cx="90" cy="222" r="20"/><text class="lbl" x="90" y="222">D</text>

  <!-- divider -->
  <line x1="340" y1="50" x2="340" y2="260" stroke="#EAEAEA" stroke-width="1.5"/>

  <!-- AFTER -->
  <text class="cap" x="510" y="28">After: net through a clearing party</text>
  <path class="edge" d="M448,86 L494,134"/>
  <path class="edge" d="M572,86 L526,134"/>
  <path class="edge" d="M508,166 L450,210"/>
  <path class="edge" d="M512,166 L570,210"/>
  <circle class="node" cx="430" cy="78" r="20"/><text class="lbl" x="430" y="78">A</text>
  <circle class="node" cx="590" cy="78" r="20"/><text class="lbl" x="590" y="78">B</text>
  <circle class="hub" cx="510" cy="150" r="22"/><text class="lbl" x="510" y="150">N</text>
  <circle class="node" cx="430" cy="222" r="20"/><text class="lbl" x="430" y="222">C</text>
  <circle class="node" cx="590" cy="222" r="20"/><text class="lbl" x="590" y="222">D</text>
</svg>
